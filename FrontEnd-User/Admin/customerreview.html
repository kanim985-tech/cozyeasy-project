<!DOCTYPE html>
<html>
<head>
  <title>Customer Reviews</title>
  <style>
    body {
  font-family: Arial;
  background: #f4f6f9;
  /* padding: 20px; */
}
.container{
  display: flex;
  gap: 20px;
}

/* Sidebar */
    .sidebar {
      width: 180px;
      background: #333;
      color: white;
      height: auto;
      padding: 10px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar li {
      padding: 10px 0;
      cursor: pointer;
      text-decoration: none;
    }

    .sidebar li:hover {
      background: #555;
    }
    /*  */
    .sidebar a {
  text-decoration: none;
  color: white;
  display: block;
  /* padding: 10px; */
  border-radius: 6px;
}

.sidebar a:hover {
  background: #555;
}

    /* main */

    .main{
      flex: 1;
      
    }

/* h1 {
  margin-bottom: 20px;
} */

.section {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, select {
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px 12px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}

ul {
  list-style: none;
  padding: 0;
}

.review {
  background: #eee;
  margin: 10px 0;
  padding: 10px;
  border-radius: 5px;
}

.review span {
  font-size: 12px;
  color: gray;
}

.delete-btn {
  float: right;
  background: rgb(173, 88, 88);
  border-radius: 5px;
  padding: 5px 8px;
}
  </style>
</head>
<body>

  <div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin</h2>
    <ul>
  <li><a href="Dashboard.html">Dashboard</a></li>
  <li><a href="productmanagement.html">Product Management</a></li>
  <li><a href="ordermanagement.html">Order Management</a></li>
  <li><a href="offermanagement.html">Offer Management</a></li>
  <li><a href="contactmanagement.html">Contact Management</a></li>
  <li><a href="customerreview.html">Customer Review</a></li>
</ul>
  </div>

<div class="main">
<h1>Customer Reviews</h1>

<!-- ADD REVIEW -->
<div class="section">
  <h2>Add Review</h2>
  <input id="user" placeholder="Customer Name">
  <input id="comment" placeholder="Comment">
  
  <select id="rating">
    <option value="5">5 ⭐</option>
    <option value="4">4 ⭐</option>
    <option value="3">3 ⭐</option>
    <option value="2">2 ⭐</option>
    <option value="1">1 ⭐</option>
  </select>

  <button onclick="addReview()">Submit</button>
</div>

<!-- POSITIVE -->
<div class="section">
  <h2>Positive Feedback 😊</h2>
  <ul id="positiveList"></ul>
</div>

<!-- NEGATIVE -->
<div class="section">
  <h2>Negative Feedback 😞</h2>
  <ul id="negativeList"></ul>
</div>

<!-- RECENT -->
<div class="section">
  <h2>Recent Feedback 🆕</h2>
  <ul id="recentList"></ul>
</div>
</div>
</div>

<script>
    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

// ADD REVIEW
function addReview() {
  let user = document.getElementById("user").value;
  let comment = document.getElementById("comment").value;
  let rating = document.getElementById("rating").value;

  let review = {
    user,
    comment,
    rating: Number(rating),
    date: new Date()
  };

  reviews.push(review);
  localStorage.setItem("reviews", JSON.stringify(reviews));

  displayReviews();
}

// DISPLAY REVIEWS
function displayReviews() {
  let positive = document.getElementById("positiveList");
  let negative = document.getElementById("negativeList");
  let recent = document.getElementById("recentList");

  positive.innerHTML = "";
  negative.innerHTML = "";
  recent.innerHTML = "";

  // SORT RECENT
  let sorted = [...reviews].sort((a, b) => new Date(b.date) - new Date(a.date));

  // RECENT (last 5)
  sorted.slice(0, 5).forEach((r, index) => {
    recent.appendChild(createReview(r, index));
  });

  // POSITIVE (4 & 5)
  reviews.forEach((r, index) => {
    if (r.rating >= 4) {
      positive.appendChild(createReview(r, index));
    }
  });

  // NEGATIVE (1 & 2)
  reviews.forEach((r, index) => {
    if (r.rating <= 2) {
      negative.appendChild(createReview(r, index));
    }
  });
}

// CREATE REVIEW ELEMENT
function createReview(r, index) {
  let li = document.createElement("li");
  li.className = "review";

  li.innerHTML = `
    <b>${r.user}</b> - ${r.comment} ⭐${r.rating}
    <br><span>${new Date(r.date).toLocaleString()}</span>
    <button class="delete-btn" onclick="deleteReview(${index})">X</button>
  `;

  return li;
}

// DELETE
function deleteReview(index) {
  reviews.splice(index, 1);
  localStorage.setItem("reviews", JSON.stringify(reviews));
  displayReviews();
}

// INIT
displayReviews();
</script>
</body>
</html>
