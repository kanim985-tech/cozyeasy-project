<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body {
    font-family: Georgia, serif;
    background: #b58c8c;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #fff;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
}

input, select {
    width: 97%;
    padding: 10px;
    margin-top: 10px;
}

.order-item {
    display: flex;
    justify-content: space-between;
}

.total {
    font-weight: bold;
    text-align: right;
}

button {
    width: 100%;
    padding: 15px;
    background: #691c1cea;
    color: white;
    border: none;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- Order Summary -->
<div class="card">
    <h2>Order Summary</h2>
    <div id="order-items"></div>
    <div class="total" id="total"></div>
</div>

<!-- Address -->
<div class="card">
    <h2>Delivery Address</h2>
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="address" placeholder="Address">
    <input id="city" placeholder="City">
</div>

<!-- Payment -->
<div class="card">
    <h2>Payment Method</h2>
    <select id="payment">
        <option>Cash on Delivery</option>
        <option>UPI</option>
        <option>Credit/Debit Card</option>
    </select>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

// ---------------- LOAD ORDER ----------------
let cart = JSON.parse(localStorage.getItem("checkout"));

if (!cart || cart.length === 0) {
    cart = JSON.parse(localStorage.getItem("buyNow")) || [];
}

function loadOrder() {
    let container = document.getElementById("order-items");
    let total = 0;
    container.innerHTML = "";

    cart.forEach(item => {
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        container.innerHTML += `
        <div class="order-item">
            <span>${item.name} x ${item.qty}</span>
            <span>₹${itemTotal}</span>
        </div>`;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}


// ---------------- PLACE ORDER ----------------
async function placeOrder() {

    if (!cart.length) {
        alert("Cart is empty!");
        return;
    }

    if (!cart[0].id) {
        alert("Product ID missing!");
        console.log(cart);
        return;
    }

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let city = document.getElementById("city").value;

    if (!name || !phone || !address || !city) {
        alert("Please fill all details!");
        return;
    }

    let user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        alert("Please login first!");
        window.location.href = "login.html";
        return;
    }

    let total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

    let orderData = {
        user_id: user.user_id,
        customer_name: name,
        phone: phone,
        address: address,
        city: city,
        payment_method: document.getElementById("payment").value,
        total_amount: total,

        items: cart.map(item => ({
            product_id: Number(item.id),   // 🔥 FIX (IMPORTANT)
            quantity: Number(item.qty),
            price: Number(item.price)
        }))
    };

    console.log("ORDER DATA:", orderData); // DEBUG

    try {
        let res = await fetch("http://localhost:8000/api/orders/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(orderData)
        });

        let data = await res.json();

        if (res.ok) {
            alert("Order placed! Order No: " + data.order_number);

            localStorage.removeItem("cart");
            localStorage.removeItem("checkout");
            localStorage.removeItem("buyNow");

            window.location.href = "./myorder.html";
        } else {
            alert("Error: " + data.detail);
        }

    } catch (err) {
        console.error(err);
        alert("Server error. Check backend.");
    }
}


// ---------------- INIT ----------------
loadOrder();

</script>

</body>
</html>
