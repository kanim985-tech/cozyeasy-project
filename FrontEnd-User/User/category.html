<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="script.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Georgia", serif;
}
body{
    background:#f5f5f5;
}
.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    margin-top:50px;
}
.product{
    background:white;
    padding:20px;
    text-align:center;
    position:relative;
    border:1px solid #eee;
    transition:0.3s;
}
.product:hover{
    transform:translateY(-8px);
    box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
}
.product img{
    width:100%;
    height:260px;
    object-fit:cover;
    margin-bottom:15px;
}
.product h3{
    font-size:20px;
    margin-bottom:10px;
}
.price{
    color:#c85a5a;
    font-size:18px;
    margin-bottom:15px;
}
button{
    padding:10px 15px;
    margin:5px;
    border:1px solid #333;
    background:white;
    cursor:pointer;
    font-size:12px;
}
button:hover{
    background:#720404;
    color:white;
}
.badge{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:5px 10px;
    font-size:11px;
    border:1px solid #ddd;
}
.heart{
    position:absolute;
    top:20px;
    right:20px;
    background-color:#cabbbb;
    color:#cf3333;
    border-radius:50px;
    padding:5px;
}
</style>
</head>

<body>

<div id="header"></div>
<!-- ADD THIS JUST AFTER <body> -->
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Categories</h3>

<label><input type="checkbox" value="Flowers" onchange="filterProducts()"> Flowers</label>
<label><input type="checkbox" value="Cakes" onchange="filterProducts()"> Cakes</label>
<label><input type="checkbox" value="Chocolates" onchange="filterProducts()"> Chocolates</label>
<label><input type="checkbox" value="Gifts" onchange="filterProducts()"> Gifts</label>
<label><input type="checkbox" value="Special Occasion" onchange="filterProducts()"> Special Occasion</label>
  <button onclick="clearFilters()">Clear</button>
</div>

<div class="container" id="productContainer">

 



</div> 

<!-- SCRIPT -->
<script>
const API_URL = "http://localhost:8000/api/products";

// ---------------- LOAD PRODUCTS ----------------
async function loadProducts() {
    try {
        let res = await fetch(API_URL);
        let products = await res.json();
        displayProducts(products);
    } catch (error) {
        console.error("Error loading products:", error);
    }
}

// ---------------- DISPLAY PRODUCTS ----------------
function displayProducts(products) {
    let container = document.getElementById("productContainer");
    container.innerHTML = "";

    products.forEach(product => {
        let productHTML = `
            <div class="product">
                <span class="heart"><i class="fa-solid fa-heart"></i></span>

                <img src="${product.image}" 
                     onclick="viewProduct(${product.id})">

                <h3>${product.name}</h3>

                <!-- price -->
                <p class="price">₹${product.price}</p>

                <!-- category -->
                <p style="font-size:12px;color:gray">${product.category}</p>

                <!-- offer -->
                ${product.offer ? `<p style="color:green">${product.offer}% OFF</p>` : ""}

                <button onclick="addToCart(${product.id}, '${product.name}', ${product.price})">
                    Add to Cart
                </button>

                <button onclick="buyNow(${product.id}, '${product.name}', ${product.price})">
                    Buy Now
                </button>
            </div>
        `;
        container.innerHTML += productHTML;
    });
}

// ---------------- FILTER ----------------
async function filterProducts() {
    let checked = document.querySelectorAll(".sidebar input:checked");

    // ❌ REMOVE toLowerCase()
    let categories = Array.from(checked).map(cb => cb.value);

    let res = await fetch(API_URL);
    let products = await res.json();

    console.log("Selected:", categories);
    console.log("Products:", products);

    if (categories.length > 0) {
        products = products.filter(p =>
            p.category && categories.includes(p.category)
        );
    }

    displayProducts(products);
}
// ---------------- CLEAR FILTER ----------------
function clearFilters() {
    document.querySelectorAll(".sidebar input").forEach(cb => cb.checked = false);
    loadProducts();
}

// ---------------- CART ----------------
function addToCart(id, name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.id === id);

    if (existing) {
        existing.qty += 1;
    } else {
        cart.push({ id, name, price, qty: 1 });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart!");
}
// ---------------- BUY NOW ----------------
function buyNow(id, name, price) {
    let product = [{ id, name, price, qty: 1 }];
    localStorage.setItem("buyNow", JSON.stringify(product));
    window.location.href = "payment.html";
}

// ---------------- VIEW PRODUCT ----------------
function viewProduct(id) {
    window.location.href = `productdetails.html?id=${id}`;
}

// ---------------- INIT ----------------
loadProducts();
</script>
</body>
</html>

<style>
  .layout {
    display: flex;
    align-items: flex-start;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #fff;
    padding: 20px;
    height: 100vh;
    position: sticky;
    top: 0;
    border-right: 1px solid #eee;
}

.sidebar h3 {
    margin-bottom: 15px;
}

.sidebar label {
    display: block;
    margin-bottom: 10px;
    cursor: pointer;
    font-size: 14px;
}

.sidebar input {
    margin-right: 8px;
}

.sidebar button {
    margin-top: 15px;
    width: 100%;
    background: #720404;
    color: white;
    border: none;
}
.container {
    max-width: 1200px;
    margin: 50px auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    padding-left: 20px;
}
</style>
