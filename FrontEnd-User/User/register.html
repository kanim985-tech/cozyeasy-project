<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        body{
            background-color: rgb(176, 157, 128);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container{
            justify-content: center;
            text-align: center;
            width: 350px;
            background-color: white;
            padding: 28px;
            border-radius: 20px;
        }
        .cozy{
            width: 200px;
            height: 80px;
            background-color: rgb(139, 88, 88);
            color: white;
            font-size: 35px;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin:0 auto 20px;
        }
        .input-label{
            display: inline-block;
        }
        h2{
            font-size: 26px;
            color: #1f2937;
            margin-bottom: 2px; 
        }
        .sub-text{
            color: #ad5312;  
                     
        }
        .sub-text span{
            color: #6b7280;
        }
        form{
            text-align: left;
        }
         .input-box{
            display: flex;
            align-items: center;
            border:  none;
            border-radius: 10px;
            /* padding: 12px; */
            margin-bottom: 20px;
        }
          .input-box input{
            border: none;
            flex:1;
            font-size: 14px;
            padding: 8px;
            border-radius: 10px;
            background-color: antiquewhite;
            width: 100%;
        }
        .pass{
            margin-bottom: 20px;
        }
         .submit{
            width: 100%;
            padding: 10px;
            background-color: #7f502e;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }
    </style>
</head>
<body>
    <section class="container">
         <div class="cozy">
        CozyEasy
    </div>

    <h2>Create your account</h2>
    <p class="sub-text"><span>or</span> <a href="login.html">Sign in to existing account </a></p>
     <form onsubmit="registerUser(event)">
    
    <label>Full Name :</label>
    <div class="input-box">
        <input type="text" id="username" required>
    </div>

    <label>Email Address :</label>
    <div class="input-box">
        <input type="email" id="email" required>
    </div>

    <label>Password :</label>
    <div class="input-box pass">
        <input type="password" id="password" required>
    </div>

    <button class="submit" type="submit">Create account</button>
</form>

    </section>
    
</body>
</html>

<script>
async function registerUser(event) {
    event.preventDefault();

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    try {
        let res = await fetch("http://localhost:8000/api/users/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, email, password })
        });

        let data = await res.json();

        if (res.ok) {
            alert("Registration successful!");
            window.location.href = "login.html";
        } else {
            alert(data.detail);
        }

    } catch (err) {
        console.error(err);
        alert("Registration failed");
    }
}
</script>
